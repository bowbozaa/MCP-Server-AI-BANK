name = "mosses-agent-runner"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Account ID (replace with yours)
account_id = "your-account-id"

# Workers AI binding
[ai]
binding = "AI"

# KV for caching agent responses
[[kv_namespaces]]
binding = "AGENT_CACHE"
id = "your-kv-id"

# D1 for agent run logs
[[d1_databases]]
binding = "DB"
database_name = "agent_runs"
database_id = "your-d1-id"

# Environment variables
[vars]
ENVIRONMENT = "production"
MAX_AGENTS = "17"

# Secrets (set via: wrangler secret put SECRET_NAME)
# - ANTHROPIC_API_KEY
# - RUNNER_API_KEY
# - LINE_NOTIFY_TOKEN
