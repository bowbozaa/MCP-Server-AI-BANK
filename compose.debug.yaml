services:
  githubbridge:
    image: githubbridge
    build:
      context: github-bridge-worker/github-bridge-worker
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
    ports:
      - 3000:3000
      - 9229:9229
    command: ["node", "--inspect=0.0.0.0:9229", "index.js"]
